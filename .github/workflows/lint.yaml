---
name: Lint

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions: read-all

env:
  # Currently no way to detect automatically
  DEFAULT_BRANCH: main

jobs:
  build:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Lint
        uses: github/super-linter/slim@v7
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'workflow_dispatch' }}
          DEFAULT_BRANCH: "${{ env.DEFAULT_BRANCH }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          ANSIBLE_CONFIG_FILE: .ansible-lint
          CHECKOV_FILE_NAME: .checkov.yaml
          MARKDOWN_CONFIG_FILE: .markdownlint.yaml
          TERRAFORM_TFLINT_CONFIG_FILE: .tflint.hcl
          YAML_CONFIG_FILE: .yamllint.yaml
          KUBERNETES_KUBEVAL_OPTIONS: --ignore-missing-schemas -v 1.23.3
          # Secret: always SOPS-encrypted here, and the sops metadata block can
          # never pass strict schema validation
          # -ignore-missing-schemas: CRD kinds (CNPG, MetalLB, traefik…) have no
          # public schema; same posture as the kubeval options below
          KUBERNETES_KUBECONFORM_OPTIONS: -skip HelmRelease,Kustomization,Component,PrometheusRule,ExternalSecret,Secret -ignore-missing-schemas
          # JSCPD: all detected clones are legitimate GitOps boilerplate (HelmRelease
          # spec blocks, SOPS metadata). Super-linter v7 overrides threshold to 0%
          # via CLI flags, making the .jscpdrc.json threshold setting ineffective.
          VALIDATE_JSCPD: false
