---
# Scan raw manifests only. The kustomize framework renders overlays into /tmp
# where skip-path can't match (it resurrects the skipped Flux-generated
# resources as "overlay:base:*"), and it crashes on Flux-only features like
# ${VAR} substitution anyway.
skip-framework:
  - kustomize

# Skip paths that are upstream/generated files or can't be scanned
skip-path:
  - cluster/base/flux-system/gotk-components.yaml # Flux-generated, not owned
  - cluster/base/flux-system # Flux-generated kustomize overlay; skip-path on gotk-components.yaml alone doesn't suppress kustomize scan
  - archive # Retired configs, not deployed

# Skip checks that produce false positives in this repo
skip-check:
  # SOPS-encrypted files have no readable namespace; checkov defaults to "default"
  - CKV_K8S_21
  # Flux variable substitution (${SECRET_DOMAIN/-}) causes kustomize runner crash
  - CKV_K8S_6
  # False positive: ingress-authentik.yaml has no snippet annotations
  - CKV_K8S_154
  # Not applicable: this repo does not build artifacts
  - CKV_GHA_6
