---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vane
  namespace: vane
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      vane:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          # fsGroup makes the fresh proxmox-csi (block) volume writable by the
          # container regardless of its uid (fsGroup is added to supplementary
          # groups + chowns the volume). Works on block, unlike NFS.
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          vane:
            image:
              # slim = no bundled SearXNG; we point at the existing in-cluster one.
              repository: itzcrazykns1337/vane
              tag: slim-v1.12.2
            env:
              TZ: "${TZ}"
              # existing in-cluster SearXNG (formats already include json)
              SEARXNG_API_URL: http://searxng.searxng.svc.cluster.local:8080
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 20
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 20
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                # headroom for the local embeddings model running in-process
                memory: 2Gi

    service:
      app:
        controller: vane
        ports:
          http:
            port: 3000

    ingress:
      app:
        className: traefik
        annotations:
          hajimari.io/appName: "Vane"
          hajimari.io/group: "Gen-AI"
          hajimari.io/icon: mdi:magnify-scan
        hosts:
          - host: "vane.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http

    persistence:
      data:
        existingClaim: vane-data
        globalMounts:
          - path: /home/vane/data
