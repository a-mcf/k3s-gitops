---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llamacpp
  namespace: ai
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    defaultPodOptions:
      runtimeClassName: nvidia

    controllers:
      llamacpp:
        # Parked at 0 — the Gemma 26B-A4B experiment was abandoned (open upstream
        # Gemma-4 thinking termination bugs on llama.cpp: peg-gemma4 parser loop
        # ggml-org/llama.cpp#21375 + INT_MAX reasoning-budget default = hangs).
        # vLLM Gemma 4 12B is the daily driver. Flip to 1 to revisit when upstream
        # fixes land (and scale vllm gemma4-12b-qat -> 0; one model per 3090).
        replicas: 0
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          # Same GPU pattern as vllm/ollama: pin to the GPU node + runtimeClassName
          # nvidia, NO device-plugin claim (nvidia.com/gpu: 0). Exclusivity is managed
          # by toggling — only one GPU model runs at a time (this PR sets vllm-12b -> 0).
          nodeSelector:
            gpu: "true"
        containers:
          llamacpp:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              # server-cuda, digest-pinned (rolling tag → immutable digest as of 2026-06-19).
              tag: "server-cuda@sha256:8d1e8ddc42585632d7bd625c2285eba891ed2ed4428e9eda25ca71ce2f6cce27"
            args:
              # Unsloth dynamic QAT GGUF — recovers MoE-expert quality (70.2->85.6% vs
              # naive q4_0). Auto-downloads to LLAMA_CACHE (the PVC) on first boot.
              - "--hf-repo"
              - "unsloth/gemma-4-26B-A4B-it-qat-GGUF"
              - "--hf-file"
              - "gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf"
              - "-ngl"
              - "99"
              # f16 KV (NO -ctk/-ctv quant — Gemma SWA-cache quant = quality trap).
              # -c 32768 conservative for first boot; KV math says far more fits (raise later).
              - "-c"
              - "32768"
              # -fa REQUIRES a value in this build (bare -fa ate the next arg -> crash).
              - "-fa"
              - "on"
              # Vision: 26B-A4B is encoder-based (Gemma4ForConditionalGeneration, has a
              # real vision encoder — unlike the 12B's encoder-free unified arch). --hf-repo
              # AUTO-downloads the mmproj, so vision is on by default (no --no-mmproj).
              - "--host"
              - "0.0.0.0"
              - "--port"
              - "8080"
              - "--alias"
              - "gemma4-26b"
            env:
              TZ: "${TZ}"
              NVIDIA_VISIBLE_DEVICES: all
              NVIDIA_DRIVER_CAPABILITIES: all
              LLAMA_CACHE: /models
            probes:
              # First boot downloads ~17GB then loads → long startup grace.
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  failureThreshold: 160 # ~40 min for 17GB download + load
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 2Gi
                nvidia.com/gpu: 0
              limits:
                memory: 8Gi
                nvidia.com/gpu: 0

    service:
      app:
        controller: llamacpp
        ports:
          http:
            port: 8080

    ingress:
      app:
        className: traefik
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "llama.cpp (Gemma 26B)"
          gethomepage.dev/group: "Gen-AI"
          gethomepage.dev/icon: "mdi-brain"
        hosts:
          - host: "llamacpp.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http

    persistence:
      models:
        existingClaim: llamacpp-models
        globalMounts:
          - path: /models
