---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-consumers
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: home
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vane
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ollama
