---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
  namespace: ai
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          litellm:
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.91.0
            args:
              - "--config"
              - "/etc/litellm/config.yaml"
              - "--port"
              - "4000"
            envFrom:
              - secretRef:
                  name: litellm-secret
            probes:
              # TCP probes for the MVP — robust against a path typo on first boot.
              # Upgrade to HTTP later: liveness /health/liveliness,
              # readiness /health/readiness (LiteLLM's own endpoints).
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 4000
                  initialDelaySeconds: 20
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 4000
                  initialDelaySeconds: 20
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                # LiteLLM spikes loading provider SDKs at startup; 1Gi OOMKilled it.
                memory: 2Gi

    service:
      app:
        controller: litellm
        ports:
          http:
            port: 4000

    ingress:
      app:
        className: traefik
        annotations:
          hajimari.io/appName: "LiteLLM"
          hajimari.io/group: "Gen-AI"
          hajimari.io/icon: mdi:router-network
        hosts:
          - host: "litellm.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http

    persistence:
      config:
        type: configMap
        name: litellm-config
        globalMounts:
          - path: /etc/litellm
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
