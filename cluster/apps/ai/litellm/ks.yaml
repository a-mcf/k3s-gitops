---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-litellm
  namespace: flux-system
spec:
  path: "./cluster/apps/ai/litellm/app"
  dependsOn:
    - name: cluster-apps-external-secrets-store-onepassword
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 15m
