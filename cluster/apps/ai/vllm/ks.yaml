---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-vllm
  namespace: flux-system
spec:
  path: "./cluster/apps/ai/vllm/app"
  dependsOn:
    - name: cluster-apps-nvidia-device-plugin
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 15m
