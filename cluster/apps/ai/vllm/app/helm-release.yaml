---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
  namespace: ai
spec:
  interval: 30m
  chart:
    spec:
      chart: vllm-stack
      version: 0.1.11
      sourceRef:
        kind: HelmRepository
        name: vllm
        namespace: flux-system
  timeout: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    servingEngineSpec:
      runtimeClassName: nvidia
      strategy:
        type: Recreate
      modelSpec:
        # Gemma 4 12B Unified (multimodal, encoder-free) — QAT W4A16 compressed-tensors.
        # vLLM auto-detects quant config; no --quantization flag required.
        # Image: gemma4-unified tag is required until Gemma 4 ships in a stable vLLM release.
        # For CUDA 12.9 hosts, switch tag to gemma4-unified-cu129.
        - name: gemma4-12b-qat
          repository: vllm/vllm-openai
          tag: gemma4-unified
          modelURL: google/gemma-4-12B-it-qat-w4a16-ct
          replicaCount: 1
          requestCPU: 0
          requestMemory: 4Gi
          requestGPU: 0
          vllmConfig:
            tensorParallelSize: 1
            maxModelLen: 32768
            enablePrefixCaching: true
            enableChunkedPrefill: true
            extraArgs:
              - "--reasoning-parser"
              - "gemma4"
              - "--enable-auto-tool-choice"
              - "--tool-call-parser"
              - "gemma4"
              - "--gpu-memory-utilization"
              - "0.90"
              - "--download-dir"
              - "/data/huggingface"
              # Skip image/audio profiling — 24GB 3090 has no headroom for multimodal at 32k ctx.
              # Drop these two args to re-enable vision/audio (will need to lower maxModelLen).
              - "--limit-mm-per-prompt"
              - '{"image": 0, "audio": 0}'

          shmSize: 8Gi

          env:
            - name: TZ
              value: "${TZ}"
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all
            - name: VLLM_CACHE_ROOT
              value: /data/vllm-cache
            - name: TRITON_CACHE_DIR
              value: /data/vllm-cache/triton

          nodeSelectorTerms:
            - matchExpressions:
                - key: gpu
                  operator: In
                  values:
                    - "true"

          extraVolumeMounts:
            - name: data
              mountPath: /data

          extraVolumes:
            - name: data
              persistentVolumeClaim:
                claimName: nfs-vllm-data-pvc

        # Qwen3.5 9B AWQ — previous active model. Uncomment to restore (and disable gemma4 above).
