---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
  namespace: ai
spec:
  interval: 30m
  chart:
    spec:
      chart: vllm-stack
      version: 0.1.11
      sourceRef:
        kind: HelmRepository
        name: vllm
        namespace: flux-system
  timeout: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    servingEngineSpec:
      runtimeClassName: nvidia
      strategy:
        type: Recreate
      modelSpec:
        # Original AWQ model (uncomment to switch back):
        - name: qwen35-9b-awq
          repository: vllm/vllm-openai
          tag: v0.19.0
          modelURL: QuantTrio/Qwen3.5-9B-AWQ
          replicaCount: 1
          requestCPU: 0
          requestMemory: 4Gi
          requestGPU: 0
          vllmConfig:
            tensorParallelSize: 1
            maxModelLen: 65536
            enablePrefixCaching: true
            enableChunkedPrefill: true
            extraArgs:
              - "--quantization"
              - "awq_marlin"
              - "--trust-remote-code"
              - "--reasoning-parser"
              - "qwen3"
              - "--enable-auto-tool-choice"
              - "--tool-call-parser"
              - "qwen3_coder"
              - "--gpu-memory-utilization"
              - "0.8"
              - "--download-dir"
              - "/data/huggingface"
              - "--enable-lora"
              - "--lora-modules"
              - "glados-qwen35-9b=/data/lora/glados-mm"


        # # GLaDOS: merged LoRA bf16 Qwen3.5-9B (OOMs on 3090)
        # - name: glados-qwen35-9b-b16
        #   repository: vllm/vllm-openai
        #   tag: v0.18.1
        #   modelURL: /data/models/glados-merged
        #   replicaCount: 1
        #
        #   requestCPU: 0
        #   requestMemory: 4Gi
        #   requestGPU: 0
        #
        #   vllmConfig:
        #     tensorParallelSize: 1
        #     maxModelLen: 32768
        #     enablePrefixCaching: true
        #     enableChunkedPrefill: true
        #     extraArgs:
        #       - "--trust-remote-code"
        #       - "--reasoning-parser"
        #       - "qwen3"
        #       - "--enable-auto-tool-choice"
        #       - "--tool-call-parser"
        #       - "qwen3_coder"
        #       - "--gpu-memory-utilization"
        #       - "0.95"
        #       - "--download-dir"
        #       - "/data/huggingface"
        #       - "--tokenizer"
        #       - "Qwen/Qwen3.5-9B"

        # GLaDOS: merged LoRA + GPTQ 8-bit quantized Qwen3.5-9B
        # - name: glados-qwen35-9b-gptq-8bit
        #   repository: vllm/vllm-openai
        #   tag: v0.18.1
        #   modelURL: /data/models/glados-gptq-8bit
        #   replicaCount: 1

        #   requestCPU: 0
        #   requestMemory: 4Gi
        #   requestGPU: 0

        #   vllmConfig:
        #     tensorParallelSize: 1
        #     maxModelLen: 32768
        #     enablePrefixCaching: true
        #     enableChunkedPrefill: true
        #     extraArgs:
        #       - "--quantization"
        #       - "gptq_marlin"
        #       - "--dtype"
        #       - "float16"
        #       - "--trust-remote-code"
        #       - "--reasoning-parser"
        #       - "qwen3"
        #       - "--enable-auto-tool-choice"
        #       - "--tool-call-parser"
        #       - "qwen3_coder"
        #       - "--gpu-memory-utilization"
        #       - "0.85"
        #       - "--download-dir"
        #       - "/data/huggingface"
        #       - "--tokenizer"
        #       - "Qwen/Qwen3.5-9B"

        # GLaDOS: merged LoRA + GPTQ 4-bit quantized Qwen3.5-9B
        # - name: glados-qwen35-9b-gptq
        #   repository: vllm/vllm-openai
        #   tag: v0.18.1
        #   modelURL: /data/models/glados-gptq
        #   replicaCount: 1
        
        #   requestCPU: 0
        #   requestMemory: 4Gi
        #   requestGPU: 0
        
        #   vllmConfig:
        #     tensorParallelSize: 1
        #     maxModelLen: 32768
        #     enablePrefixCaching: true
        #     enableChunkedPrefill: true
        #     extraArgs:
        #       - "--quantization"
        #       - "gptq_marlin"
        #       - "--dtype"
        #       - "float16"
        #       - "--trust-remote-code"
        #       - "--reasoning-parser"
        #       - "qwen3"
        #       - "--enable-auto-tool-choice"
        #       - "--tool-call-parser"
        #       - "qwen3_coder"
        #       - "--gpu-memory-utilization"
        #       - "0.8"
        #       - "--download-dir"
        #       - "/data/huggingface"
        #       - "--tokenizer"
        #       - "Qwen/Qwen3.5-9B"

          shmSize: 8Gi

          env:
            - name: TZ
              value: "${TZ}"
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all
            - name: VLLM_CACHE_ROOT
              value: /data/vllm-cache
            - name: TRITON_CACHE_DIR
              value: /data/vllm-cache/triton

          nodeSelectorTerms:
            - matchExpressions:
                - key: gpu
                  operator: In
                  values:
                    - "true"

          extraVolumeMounts:
            - name: data
              mountPath: /data
            # - name: vllm-patches
            #   mountPath: /usr/local/lib/python3.12/dist-packages/vllm/model_executor/models/qwen3_5.py
            #   subPath: qwen3_5.py
            #   readOnly: true

          extraVolumes:
            - name: data
              persistentVolumeClaim:
                claimName: nfs-vllm-data-pvc
            - name: vllm-patches
              configMap:
                name: vllm-patches

    routerSpec:
      enableRouter: true
      ingress:
        enabled: true
        className: traefik
        annotations:
          hajimari.io/icon: "mdi:brain"
          hajimari.io/group: "Gen-AI"
        hosts:
          - host: "vllm.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - "vllm.${SECRET_DOMAIN}"
