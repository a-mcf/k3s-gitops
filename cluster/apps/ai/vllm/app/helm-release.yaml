    routerSpec:
      enableRouter: true
      ingress:
        enabled: true
        className: traefik
        annotations:
          hajimari.io/icon: "mdi:brain"
          hajimari.io/group: "Gen-AI"
        hosts:
          - host: "vllm.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - "vllm.${SECRET_DOMAIN}"
