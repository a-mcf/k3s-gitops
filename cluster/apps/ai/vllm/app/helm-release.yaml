---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
  namespace: ai
spec:
  interval: 30m
  chart:
    spec:
      chart: vllm-stack
      version: 0.1.10
      sourceRef:
        kind: HelmRepository
        name: vllm
        namespace: flux-system
  timeout: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    servingEngineSpec:
      runtimeClassName: nvidia
      modelSpec:
        - name: qwen35-9b-awq
          repository: vllm/vllm-openai
          tag: v0.18.0
          modelURL: QuantTrio/Qwen3.5-9B-AWQ
          replicaCount: 1

          requestCPU: 1
          requestMemory: 4Gi
          requestGPU: 0

          vllmConfig:
            tensorParallelSize: 1
            maxModelLen: 16384
            gpuMemoryUtilization: 0.9
            enablePrefixCaching: true
            enableChunkedPrefill: true
            extraArgs:
              - "--quantization"
              - "awq_marlin"
              - "--trust-remote-code"
              - "--reasoning-parser"
              - "qwen3"
              - "--enable-auto-tool-choice"
              - "--tool-call-parser"
              - "qwen3_coder"

          shmSize: 8Gi

          env:
            - name: TZ
              value: "${TZ}"
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all

          nodeSelectorTerms:
            - matchExpressions:
                - key: gpu
                  operator: In
                  values:
                    - "true"

          extraVolumeMounts:
            - name: data
              mountPath: /data

          extraVolumes:
            - name: data
              persistentVolumeClaim:
                claimName: nfs-vllm-data-pvc

    routerSpec:
      enabled: false

    ingress:
      enabled: true
      className: nginx
      annotations:
        hajimari.io/icon: "mdi:brain"
        hajimari.io/group: "Gen-AI"
      hosts:
        - host: "vllm.${SECRET_DOMAIN}"
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - "vllm.${SECRET_DOMAIN}"
