        #   vllmConfig:
        #     tensorParallelSize: 1
        #     maxModelLen: 32768
        #     enablePrefixCaching: true
        #     enableChunkedPrefill: true
        #     extraArgs:
        #       - "--trust-remote-code"
        #       - "--reasoning-parser"
        #       - "qwen3"
        #       - "--enable-auto-tool-choice"
        #       - "--tool-call-parser"
        #       - "qwen3_coder"
        #       - "--gpu-memory-utilization"
        #       - "0.95"
        #       - "--download-dir"
        #       - "/data/huggingface"
        #       - "--tokenizer"
        #       - "Qwen/Qwen3.5-9B"

        # GLaDOS: merged LoRA + GPTQ 8-bit quantized Qwen3.5-9B
        # - name: glados-qwen35-9b-gptq-8bit
        #   repository: vllm/vllm-openai
        #   tag: v0.18.1
        #   modelURL: /data/models/glados-gptq-8bit
        #   replicaCount: 1

        #   requestCPU: 0
        #   requestMemory: 4Gi
        #   requestGPU: 0

        #   vllmConfig:
        #     tensorParallelSize: 1
        #     maxModelLen: 32768
        #     enablePrefixCaching: true
        #     enableChunkedPrefill: true
        #     extraArgs:
        #       - "--quantization"
        #       - "gptq_marlin"
        #       - "--dtype"
        #       - "float16"
        #       - "--trust-remote-code"
        #       - "--reasoning-parser"
        #       - "qwen3"
        #       - "--enable-auto-tool-choice"
        #       - "--tool-call-parser"
        #       - "qwen3_coder"
        #       - "--gpu-memory-utilization"
        #       - "0.85"
        #       - "--download-dir"
        #       - "/data/huggingface"
        #       - "--tokenizer"
        #       - "Qwen/Qwen3.5-9B"

        # GLaDOS: merged LoRA + GPTQ 4-bit quantized Qwen3.5-9B
        # - name: glados-qwen35-9b-gptq
        #   repository: vllm/vllm-openai
        #   tag: v0.18.1
        #   modelURL: /data/models/glados-gptq
        #   replicaCount: 1

        #   requestCPU: 0
        #   requestMemory: 4Gi
        #   requestGPU: 0

        #   vllmConfig:
        #     tensorParallelSize: 1
        #     maxModelLen: 32768
        #     enablePrefixCaching: true
        #     enableChunkedPrefill: true
        #     extraArgs:
        #       - "--quantization"
        #       - "gptq_marlin"
        #       - "--dtype"
        #       - "float16"
        #       - "--trust-remote-code"
        #       - "--reasoning-parser"
        #       - "qwen3"
        #       - "--enable-auto-tool-choice"
        #       - "--tool-call-parser"
        #       - "qwen3_coder"
        #       - "--gpu-memory-utilization"
        #       - "0.8"
        #       - "--download-dir"
        #       - "/data/huggingface"
        #       - "--tokenizer"
        #       - "Qwen/Qwen3.5-9B"

    routerSpec:
      enableRouter: true
      ingress:
        enabled: true
        className: traefik
        annotations:
          hajimari.io/icon: "mdi:brain"
          hajimari.io/group: "Gen-AI"
        hosts:
          - host: "vllm.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - "vllm.${SECRET_DOMAIN}"
