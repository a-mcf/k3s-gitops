---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
  namespace: ai
spec:
  interval: 30m
  chart:
    spec:
      chart: vllm-stack
      version: 0.1.11
      sourceRef:
        kind: HelmRepository
        name: vllm
        namespace: flux-system
  timeout: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    servingEngineSpec:
      runtimeClassName: nvidia
      strategy:
        type: Recreate
      modelSpec:
        # Qwen3.5 9B AWQ — parked at 0 replicas while the gemma4 experiment
        # below holds the GPU. Restore by flipping the two replicaCounts.
        - name: qwen35-9b-awq
          repository: vllm/vllm-openai
          tag: v0.19.0
          modelURL: QuantTrio/Qwen3.5-9B-AWQ
          replicaCount: 0
          requestCPU: 0
          requestMemory: 4Gi
          requestGPU: 0
          vllmConfig:
            tensorParallelSize: 1
            maxModelLen: 65536
            enablePrefixCaching: true
            enableChunkedPrefill: true
            extraArgs:
              - "--quantization"
              - "awq_marlin"
              - "--trust-remote-code"
              - "--reasoning-parser"
              - "qwen3"
              - "--enable-auto-tool-choice"
              - "--tool-call-parser"
              - "qwen3_coder"
              - "--gpu-memory-utilization"
              - "0.8"
              - "--download-dir"
              - "/data/huggingface"
              - "--enable-lora"
              - "--lora-modules"
              - "glados-qwen35-9b=/data/lora/glados-mm"

          shmSize: 8Gi

          env:
            - name: TZ
              value: "${TZ}"
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all
            - name: VLLM_CACHE_ROOT
              value: /data/vllm-cache
            - name: TRITON_CACHE_DIR
              value: /data/vllm-cache/triton

          nodeSelectorTerms:
            - matchExpressions:
                - key: gpu
                  operator: In
                  values:
                    - "true"

          extraVolumeMounts:
            - name: data
              mountPath: /data

          extraVolumes:
            - name: data
              persistentVolumeClaim:
                claimName: nfs-vllm-data-pvc

        # Gemma 4 12B Unified (multimodal, encoder-free) — QAT W4A16 compressed-tensors.
        # Take 2, 2026-06-10. Root cause of the 06-07 AttributeError (vllm#45039,
        # still open as of today): Google's QAT export strips
        # vision_config.num_soft_tokens from config.json, transformers'
        # Gemma4UnifiedVisionConfig has no class default, and vLLM reads the
        # field unconditionally at gemma4_unified.py:166/:197. Workaround:
        # inject it via --hf-overrides. 280 is the value shipped in the BF16
        # sibling google/gemma-4-12B-it config — not a guess.
        # The unified arch is still nightly-only: v0.22.1 (latest stable,
        # 2026-06-05) does not register Gemma4UnifiedForConditionalGeneration.
        # maxModelLen 131072: 8/48 layers are full-attention (rest sliding
        # window 1024), so KV is ~64KB/token + ~0.3GB fixed → ~8.3GB at 128k,
        # alongside ~8GB W4A16 weights within the 0.90 budget on the 24GB 3090.
        # Multimodal input stays disabled (limit-mm-per-prompt 0) to keep the
        # full KV budget for text context; remove that flag to enable images.
        - name: gemma4-12b-qat
          repository: vllm/vllm-openai
          tag: nightly-2c9c07c85e56c799afffd5a671a8a0bace377a39
          modelURL: google/gemma-4-12B-it-qat-w4a16-ct
          replicaCount: 0
          requestCPU: 0
          requestMemory: 4Gi
          requestGPU: 0
          vllmConfig:
            tensorParallelSize: 1
            maxModelLen: 131072
            enablePrefixCaching: true
            enableChunkedPrefill: true
            extraArgs:
              - "--reasoning-parser"
              - "gemma4"
              - "--enable-auto-tool-choice"
              - "--tool-call-parser"
              - "gemma4"
              - "--gpu-memory-utilization"
              - "0.90"
              - "--download-dir"
              - "/data/huggingface"
              - "--hf-overrides"
              - '{"vision_config": {"num_soft_tokens": 280}}'
              - "--limit-mm-per-prompt"
              - '{"image": 0, "audio": 0}'

          shmSize: 8Gi

          env:
            - name: TZ
              value: "${TZ}"
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all
            - name: VLLM_CACHE_ROOT
              value: /data/vllm-cache
            - name: TRITON_CACHE_DIR
              value: /data/vllm-cache/triton

          nodeSelectorTerms:
            - matchExpressions:
                - key: gpu
                  operator: In
                  values:
                    - "true"

          extraVolumeMounts:
            - name: data
              mountPath: /data

          extraVolumes:
            - name: data
              persistentVolumeClaim:
                claimName: nfs-vllm-data-pvc

        # Gemma 4 31B — DENSE, QAT W4A16 compressed-tensors. Spike 2026-06-15 to
        # A/B against the 12B (12B parked at replicaCount 0 above; flip back to
        # restore). Google ships W4A16 for 12B/31B but NOT the 26B-A4B MoE — its
        # tiny expert dim (704) loses too much at 4-bit, so the MoE's only QAT is
        # GGUF q4_0 (llama.cpp). arch = Gemma4ForConditionalGeneration (NOT the
        # 12B's encoder-free unified); QAT config keeps vision_soft_tokens_per_image
        # =280, so NO --hf-overrides num_soft_tokens hack needed. 60 layers
        # (12 full-attn / 48 sliding-1024), 16 kv-heads, head_dim 256/global 512
        # → Triton attn on Ampere (no FA4 kernel). VRAM is TIGHT: ~17-18GB weights
        # on 24GB leaves little KV, and 12 full-attn ×16 kv-heads is KV-hungry, so:
        # gpu-util 0.95 + fp8 KV cache (halves KV) + conservative maxModelLen 16384.
        # Read "GPU KV cache size: N tokens" at startup and tune up (raise maxModelLen,
        # or drop fp8 for quality / add --enforce-eager to trade graphs for KV).
        # Text-only (limit-mm 0) to preserve KV budget. Dense → ~42 t/s.
        - name: gemma4-31b-qat
          repository: vllm/vllm-openai
          tag: nightly-2c9c07c85e56c799afffd5a671a8a0bace377a39
          modelURL: google/gemma-4-31B-it-qat-w4a16-ct
          replicaCount: 1
          requestCPU: 0
          requestMemory: 4Gi
          requestGPU: 0
          vllmConfig:
            tensorParallelSize: 1
            # Conservative for first boot (fp16 KV is 2x fp8 and the 31B is
            # VRAM-tight). Read "GPU KV cache size: N tokens" from the log and
            # raise toward N once we know the real ceiling.
            maxModelLen: 8192
            enablePrefixCaching: true
            enableChunkedPrefill: true
            extraArgs:
              - "--reasoning-parser"
              - "gemma4"
              - "--enable-auto-tool-choice"
              - "--tool-call-parser"
              - "gemma4"
              - "--gpu-memory-utilization"
              - "0.95"
              # NO fp8 KV cache: this W4A16 checkpoint forces fp8 e4m3, which
              # Ampere/sm_86 can't do ("fp8e4nv not supported"); and fp8_e5m2 is
              # rejected ("not supported with fp8 checkpoints"). So KV stays fp16.
              # --enforce-eager frees the ~2.6GB CUDA-graph memory for KV instead
              # (the 31B is slow regardless; we want context + a clean boot).
              - "--enforce-eager"
              - "--download-dir"
              - "/data/huggingface"
              - "--limit-mm-per-prompt"
              - '{"image": 0, "audio": 0}'

          shmSize: 8Gi

          env:
            - name: TZ
              value: "${TZ}"
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all
            - name: VLLM_CACHE_ROOT
              value: /data/vllm-cache
            - name: TRITON_CACHE_DIR
              value: /data/vllm-cache/triton

          nodeSelectorTerms:
            - matchExpressions:
                - key: gpu
                  operator: In
                  values:
                    - "true"

          extraVolumeMounts:
            - name: data
              mountPath: /data

          extraVolumes:
            - name: data
              persistentVolumeClaim:
                claimName: nfs-vllm-data-pvc

        # # GLaDOS: merged LoRA bf16 Qwen3.5-9B (OOMs on 3090)
        # - name: glados-qwen35-9b-b16
        #   repository: vllm/vllm-openai
        #   tag: v0.18.1
        #   modelURL: /data/models/glados-merged
        #   replicaCount: 1
        #
        #   requestCPU: 0
        #   requestMemory: 4Gi
        #   requestGPU: 0
