---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kured
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://kubereboot.github.io/charts
      chart: kured
      version: 6.1.0
      sourceRef:
        kind: HelmRepository
        name: kubereboot-charts
        namespace: flux-system
      interval: 5m
  values:
    updateStrategy: RollingUpdate
    configuration:
      startTime: "9:00"
      endTime: "18:00"
      # Tue-Thu only: keeps reboot churn away from weekends (GPU node =
      # gaming) and Monday patch pileups / pre-weekend surprises.
      rebootDays: [tu, we, th]
      timeZone: "${TZ}"
      logFormat: json
      rebootCommand: "/bin/systemctl reboot"
      forceReboot: false
      drainTimeout: 0
      drainDelay: 30s
      rebootDelay: 120s
      # When several nodes need reboots on the same day (a kernel update
      # lands everywhere at once), hold the lock after each node returns
      # Ready so the cluster resettles before the next drain begins.
      # Back-to-back drains concentrate all workloads + image pulls on the
      # survivors (ephemeral-storage DiskPressure evictions, 2026-07-04).
      lockReleaseDelay: 30m
      period: 10m
      slackHookUrl: "${SECRET_SLACK_WEBHOOK}"
      slackChannel: "#kured"
      messageTemplateDrain: "⏳ Draining node %s"
      messageTemplateReboot: "♻️ Rebooted node %s"

    tolerations:
      - operator: "Exists"
        effect: "NoSchedule"

    metrics:
      create: true
      labels:
        release: kube-prometheus-stack