---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-lan-sync
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock:
            cidr: 172.16.0.0/16
        - ipBlock:
            cidr: 192.168.96.0/22
        - ipBlock:
            cidr: 10.42.0.0/16
      ports:
        - port: 22000
        - port: 21027
