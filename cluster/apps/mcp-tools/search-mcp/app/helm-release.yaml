# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: search-mcp
  namespace: mcp-tools
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      search-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: python
              tag: 3.14-slim@sha256:cea0e6040540fb2b965b6e7fb5ffa00871e632eef63719f0ea54bca189ce14a6
            command:
              - sh
              - -c
              # deps are installed at startup into an emptyDir rather than
              # baked into an image: keeps this ~70-line tool imageless at
              # the cost of a PyPI dependency on pod start
              - >-
                pip install --no-cache-dir --target /deps
                'mcp==1.28.1' 'trafilatura==2.1.0' &&
                exec python /app/search_mcp.py
            env:
              HOME: /tmp
              PYTHONPATH: /deps
              PYTHONUNBUFFERED: "1"
              SEARXNG_URL: http://searxng.searxng.svc.cluster.local:8080
              PROXY_URL: http://gluetun.gluetun.svc.cluster.local:8888
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8000
                  # startup includes the pip install
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
    service:
      app:
        ports:
          http:
            port: 8000
    persistence:
      script:
        type: configMap
        name: search-mcp-configmap
        globalMounts:
          - path: /app/search_mcp.py
            subPath: search_mcp.py
            readOnly: true
      deps:
        type: emptyDir
        globalMounts:
          - path: /deps
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
