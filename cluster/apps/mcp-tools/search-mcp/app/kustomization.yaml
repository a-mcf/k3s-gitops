# yaml-language-server: $schema=https://json.schemastore.org/kustomization
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mcp-tools
resources:
  - ./helm-release.yaml
configMapGenerator:
  - name: search-mcp-configmap
    files:
      - search_mcp.py=./resources/search_mcp.py
    options:
      disableNameSuffixHash: true
