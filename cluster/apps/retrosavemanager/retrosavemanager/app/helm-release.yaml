---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/common-3.2.0/charts/library/common/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: retrosavemanager
  namespace: retrosavemanager
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      retrosavemanager:
        strategy: Recreate
        containers:
          retrosavemanager:
            image:
              repository: ghcr.io/joeblack2k/retrosavemanager
              tag: v0.1.12
            env:
              TZ: ${TZ}
              AUTH_MODE: disabled
              SAVE_ROOT: /saves
              STATE_ROOT: /config
              PORT: 8080
              TLS_ENABLED: "false"
              BASE_URL: https://rsm.${SECRET_DOMAIN}
              PUBLIC_HOST: rsm.${SECRET_DOMAIN}
            # Enable once IGDB/RAWG keys exist in 1Password and external-secret.yaml is included:
            # envFrom:
            #   - secretRef:
            #       name: retrosavemanager-metadata-keys
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 512Mi
    service:
      retrosavemanager:
        controller: retrosavemanager
        ports:
          http:
            port: 8080
    ingress:
      main:
        enabled: true
        # Pin the resource name. With >1 ingress entry, bjw-s appends `-<key>` to all of them;
        # forceRename keeps the existing `retrosavemanager` Ingress name so helm patches it
        # in place instead of creating a colliding `retrosavemanager-main` resource.
        forceRename: retrosavemanager
        className: traefik
        annotations:
          hajimari.io/appName: "RetroSaveManager"
          hajimari.io/icon: "gamepad-variant"
          hajimari.io/group: "gaming"
        hosts:
          - host: &host "rsm.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: retrosavemanager
                  port: http
        tls:
          - hosts:
              - *host
      api:
        enabled: true
        # SGM-Helper clients hardcode http://. traefik-internal's web entrypoint
        # has no redirect-to-https rule, so HTTP just works for them; browsers can
        # still hit the host over HTTPS via the TLS entry below.
        className: traefik-internal
        annotations:
          hajimari.io/enable: "false"
        hosts:
          - host: &api-host "rsm-api.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: retrosavemanager
                  port: http
        tls:
          - hosts:
              - *api-host
    persistence:
      config:
        enabled: true
        existingClaim: retrosavemanager-config-pvc
        globalMounts:
          - path: /config
      saves:
        enabled: true
        existingClaim: retrosavemanager-saves-pvc
        globalMounts:
          - path: /saves
