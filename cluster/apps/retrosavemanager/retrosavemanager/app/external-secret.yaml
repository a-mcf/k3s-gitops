---
# Scaffold for IGDB / RAWG metadata API keys.
#
# To enable:
#   1. In 1Password, create an item named "retrosavemanager-metadata" with fields:
#        - IGDB_CLIENT_ID
#        - IGDB_CLIENT_SECRET
#        - RAWG_API_KEY
#   2. Uncomment the entry in app/kustomization.yaml.
#   3. Uncomment the envFrom block in helm-release.yaml.
# yaml-language-server: $schema=https://kochhaus-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: retrosavemanager-metadata-keys
  namespace: retrosavemanager
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password-connect
  target:
    name: retrosavemanager-metadata-keys
  dataFrom:
    - extract:
        key: retrosavemanager-metadata
