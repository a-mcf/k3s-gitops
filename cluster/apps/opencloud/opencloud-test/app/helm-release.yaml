---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencloud-test
  namespace: opencloud-test
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      opencloud-test:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          # Give NATS time to drain on SIGTERM before SIGKILL — ungraceful NATS
          # shutdown is the documented cause of jetstream KV corruption
          # (opencloud-eu#2282/#2314), the original v4->v5 failure trigger.
          terminationGracePeriodSeconds: 120
          securityContext:
            runAsUser: 2316
            runAsGroup: 2316
            runAsNonRoot: true
            fsGroup: 2316
            fsGroupChangePolicy: OnRootMismatch
        containers:
          opencloud:
            image:
              repository: opencloudeu/opencloud-rolling
              tag: 7.1.0
            command:
              ["/bin/sh", "-c", "opencloud init || true; opencloud server"]
            env:
              IDM_CREATE_DEMO_USERS: false
              IDM_ADMIN_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-test-secret
                    key: idm-admin-password
              OC_ENABLE_OCM: false
              OC_INSECURE: false
              OC_LOG_LEVEL: debug
              OC_URL: https://opencloud-test.${SECRET_DOMAIN}
              PROXY_TLS: false
              # System/metadata storage uses the decomposed driver — force messagepack
              # so it never needs xattrs (matches prod). xattrs DO work on this NFS
              # mount (verified 2026-06-13), so the storage-users posix driver default
              # is left in place for an honest "does current OpenCloud run here" test.
              OC_DECOMPOSEDFS_METADATA_BACKEND: messagepack
              # Keep the NATS jetstream store OFF NFS (it defaults to
              # /var/lib/opencloud/nats on the NFS volume = corruption magnet).
              # NATS is non-authoritative cache/bus, so a local emptyDir is safe
              # and self-healing on restart.
              NATS_NATS_STORE_DIR: /var/lib/nats-local
              # --- tinker knob: uncomment to force the user-files store off posix/xattrs ---
              # STORAGE_USERS_DRIVER: decomposed
            envFrom:
              - secretRef:
                  name: opencloud-test-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: opencloud-test
        ports:
          http:
            port: 9200

    ingress:
      app:
        className: traefik
        annotations:
          hajimari.io/appName: "OpenCloud (test)"
          hajimari.io/group: "Storage"
          hajimari.io/icon: arcticons:owncloud
        hosts:
          - host: "opencloud-test.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http

    persistence:
      # NOTE: mounted at the volume ROOT (no subPath). The ansible-created NFS
      # roots are owned 2316, so the pod can write directly on a clean init.
      # subPath would make kubelet create a root:root subdir that fsGroup fails
      # to chown over NFS → "permission denied". Prod uses subPath only because
      # its subdirs were pre-created owned 2316 long ago.
      storage-users:
        existingClaim: nfs-opencloud-test-storage-users-pvc
        globalMounts:
          - path: /var/lib/opencloud
      data:
        existingClaim: nfs-opencloud-test-data-pvc
        globalMounts:
          - path: /etc/opencloud
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
      # Local (non-NFS) home for the NATS jetstream store — see NATS_NATS_STORE_DIR.
      nats-local:
        type: emptyDir
        globalMounts:
          - path: /var/lib/nats-local
