---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencloud-test
  namespace: opencloud-test
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      opencloud-test:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: 2316
            runAsGroup: 2316
            runAsNonRoot: true
            fsGroup: 2316
            # Always (not OnRootMismatch): the ansible-created volume root is already
            # owned 2316, so OnRootMismatch skips the recursive chown and the
            # kubelet-created subPath subdirs (config/data) stay root:root → uid 2316
            # can't write its config on a clean init. Always forces the recurse.
            fsGroupChangePolicy: Always
        containers:
          opencloud:
            image:
              repository: opencloudeu/opencloud-rolling
              tag: 7.1.0
            command:
              ["/bin/sh", "-c", "opencloud init || true; opencloud server"]
            env:
              IDM_CREATE_DEMO_USERS: false
              IDM_ADMIN_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: opencloud-test-secret
                    key: idm-admin-password
              OC_ENABLE_OCM: false
              OC_INSECURE: false
              OC_LOG_LEVEL: debug
              OC_URL: https://opencloud-test.${SECRET_DOMAIN}
              PROXY_TLS: false
              # System/metadata storage uses the decomposed driver — force messagepack
              # so it never needs xattrs (matches prod). xattrs DO work on this NFS
              # mount (verified 2026-06-13), so the storage-users posix driver default
              # is left in place for an honest "does current OpenCloud run here" test.
              OC_DECOMPOSEDFS_METADATA_BACKEND: messagepack
              # --- tinker knob: uncomment to force the user-files store off posix/xattrs ---
              # STORAGE_USERS_DRIVER: decomposed
            envFrom:
              - secretRef:
                  name: opencloud-test-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: opencloud-test
        ports:
          http:
            port: 9200

    ingress:
      app:
        className: traefik
        annotations:
          hajimari.io/appName: "OpenCloud (test)"
          hajimari.io/group: "Storage"
          hajimari.io/icon: arcticons:owncloud
        hosts:
          - host: "opencloud-test.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http

    persistence:
      storage-users:
        existingClaim: nfs-opencloud-test-storage-users-pvc
        globalMounts:
          - path: /var/lib/opencloud
            subPath: data
      data:
        existingClaim: nfs-opencloud-test-data-pvc
        globalMounts:
          - path: /etc/opencloud
            subPath: config
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
