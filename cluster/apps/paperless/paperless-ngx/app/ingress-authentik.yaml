---
kind: Service
apiVersion: v1
metadata:
  name: authentik-outpost
  namespace: paperless
spec:
  type: ExternalName
  externalName: authentik-server.authentik.svc.cluster.local
  # Traefik requires an explicit port mapping on ExternalName services;
  # nginx tolerated the missing block.
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authentik-outpost
  namespace: paperless
spec:
  ingressClassName: traefik
  rules:
    - host: "paperless.${SECRET_DOMAIN}"
      http:
        paths:
          - path: /outpost.goauthentik.io
            pathType: ImplementationSpecific
            backend:
              service:
                name: authentik-outpost
                port:
                  number: 80
