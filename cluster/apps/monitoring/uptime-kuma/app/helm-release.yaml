---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/common-3.2.0/charts/library/common/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    values:
    controllers:
      uptime:
        containers:
          uptime:
            image:
              repository: louislam/uptime-kuma
              tag: 2.4.0
            env:
              TZ: "${TZ}"
              UPTIME_KUMA_DISABLE_FRAME_SAMEORIGIN: 0
    service:
      uptime:
        controller: uptime
        ports:
          http:
            port: 3001
    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "Uptime Kuma"
          gethomepage.dev/group: "Monitoring"
          gethomepage.dev/icon: "uptime-kuma.png"
        hosts:
          - host: &host "uptime.${SECRET_DOMAIN}"
            paths:
              - path: "/"
                pathType: "Prefix"
                service:
                  identifier: uptime
        tls:
          - hosts:
              - *host
    persistence:
      config:
        enabled: true
        existingClaim: uptime-kuma-config-proxmox-csi-pvc
        globalMounts:
          - path: /app/data
