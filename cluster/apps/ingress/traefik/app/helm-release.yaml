---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: ingress
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      version: 33.2.1
      sourceRef:
        kind: HelmRepository
        name: traefik-charts
        namespace: flux-system
  values:
    deployment:
      replicas: 1
      # Slack nebula sidecar for remote access (relocated from ingress-nginx
      # once traefik took over the public LB IP). Reuses the nebula-conf
      # secret in the ingress namespace.
      additionalContainers:
        - name: nebula
          image: nebulaoss/nebula:1.10.3
          # Override the pod-level runAsNonRoot/runAsUser: 65532 from the
          # traefik chart — nebula needs root + CAP_NET_ADMIN to open
          # /dev/net/tun and create the nebula1 interface.
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - mountPath: /config
              readOnly: true
              name: nebula-conf
            - mountPath: /dev/net/tun
              name: devnet
          args: ["-config", "/config/config.yaml"]
      additionalVolumes:
        - name: nebula-conf
          secret:
            secretName: nebula-conf
            items:
              - key: nebula.conf
                path: config.yaml
        - name: devnet
          hostPath:
            path: /dev/net/tun

    ingressClass:
      enabled: true
      name: traefik
      # Side-by-side with ingress-nginx during migration.
      # Apps opt in by setting `ingressClassName: traefik`.
      isDefaultClass: false

    providers:
      kubernetesIngress:
        enabled: true
        # Only watch Ingress resources that target this controller.
        ingressClass: traefik
        publishedService:
          enabled: true
        # Required so the paperless authentik-outpost subpath Ingress
        # (ExternalName backend to authentik-server) can be served.
        allowExternalNameServices: true
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: false
        allowExternalNameServices: false

    ports:
      # Bind directly to 80/443 inside the container (chart default is
      # 8000/8443 with a Service port-map) so the nebula sidecar's
      # in-pod traffic can reach port 443 — Services don't apply to
      # traffic already inside the pod's network namespace. The chart
      # adds NET_BIND_SERVICE so non-root traefik can claim them.
      web:
        port: 80
        expose:
          default: true
        exposedPort: 80
        redirectTo:
          port: websecure
      websecure:
        port: 443
        expose:
          default: true
        exposedPort: 443
        tls:
          enabled: true
        # Equivalent to nginx use-forwarded-headers; trust XFF from
        # MetalLB-fronted requests.
        forwardedHeaders:
          insecure: true
        proxyProtocol:
          insecure: true

    service:
      enabled: true
      type: LoadBalancer
      spec:
        loadBalancerIP: "${TRAEFIK_LB}"
        externalTrafficPolicy: Local

    tlsOptions:
      default:
        minVersion: VersionTLS12
        sniStrict: false

    # Equivalent of nginx `default-ssl-certificate`: any Ingress matched by
    # Traefik that does not specify its own `tls.secretName` falls back to
    # this wildcard cert. Reuses the cert managed by
    # cluster-apps-ingress-nginx-certificate (Certificate `${SECRET_DOMAIN/./-}`).
    tlsStore:
      default:
        defaultCertificate:
          secretName: "${SECRET_DOMAIN/./-}-tls"

    additionalArguments:
      # Match nginx proxy-body-size: 1g
      - "--entrypoints.websecure.http.middlewares="
      - "--providers.kubernetesingress.allowEmptyServices=true"

    logs:
      general:
        level: INFO
      access:
        enabled: false

    metrics:
      prometheus:
        service:
          enabled: false
        serviceMonitor:
          enabled: false

    resources:
      requests:
        memory: 100Mi
        cpu: 100m
      limits:
        memory: 500Mi
