apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 5m
  # DB migrations run inside server startup; give upgrades room so helm's
  # wait doesn't expire mid-migration and trigger a rollback the migrated
  # schema can't satisfy.
  timeout: 15m
  chart:
    spec:
      chart: immich
      version: 0.13.1
      sourceRef:
        kind: HelmRepository
        name: immich-charts
        namespace: flux-system
      interval: 1m
  upgrade:
    remediation:
      retries: 3
  values:
    valkey:
      enabled: true

    immich:
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: nfs-immich-library-pvc

    controllers:
      main:
        containers:
          main:
            env:
              MACHINE_LEARNING_PRELOAD__CLIP__TEXTUAL: "ViT-H-14-378-quickgelu__dfn5b"
              MACHINE_LEARNING_PRELOAD__CLIP__VISUAL: "ViT-H-14-378-quickgelu__dfn5b"
              # UPLOAD_LOCATION: /data
              DB_HOSTNAME: immich-cnpg-rw
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-cnpg-app
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-cnpg-app
                    key: password
              DB_DATABASE_NAME: app
              TZ: ${TZ}
  
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v3.0.2

    server:
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: 1500m
                  memory: 2048M
      persistence:
        external:
          enabled: true
          existingClaim: nfs-immich-photprism-originals-pvc
          globalMounts:
            - path: /external
              readOnly: true
      ingress:
        main:
          enabled: true
          className: traefik
          annotations:
            hajimari.io/appName: Immich
            hajimari.io/icon: arcticons:immich
            hajimari.io/group: "media"
          hosts:
            - host: immich.${SECRET_DOMAIN}
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - hosts:
                - immich.${SECRET_DOMAIN}

    machine-learning:
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: 500m
                  memory: 4096M
      persistence:
        cache:
          type: persistentVolumeClaim
          existingClaim: nfs-immich-ml-cache-pvc
