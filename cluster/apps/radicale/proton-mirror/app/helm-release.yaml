# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: proton-mirror
  namespace: radicale
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      proton-mirror:
        type: cronjob
        cronjob:
          schedule: "*/15 * * * *"
          # entries waiting on credentials live in mirrors-pending.json
          # inside the secret; move them into mirrors.json to activate
          suspend: false
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 2
        containers:
          app:
            image:
              repository: python
              tag: 3.13-slim@sha256:eb43ff125d8d58d7449dcba7d336c23bcac412f526d861db493b9994d8010280
            command: ["python", "/app/proton_mirror.py"]
            env:
              RADICALE_URL: http://radicale.radicale.svc.cluster.local:5232
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
    persistence:
      script:
        type: configMap
        name: proton-mirror-configmap
        globalMounts:
          - path: /app/proton_mirror.py
            subPath: proton_mirror.py
            readOnly: true
      config:
        type: secret
        name: proton-mirror-secret
        globalMounts:
          - path: /config/mirrors.json
            subPath: mirrors.json
            readOnly: true
