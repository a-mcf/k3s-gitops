---
# cross-namespace proxy consumers reaching the http proxy port
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-proxy-clients
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: searxng
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vane
      ports:
        - port: 8888
