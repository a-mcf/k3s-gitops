apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: proxmox-csi-plugin
  namespace: proxmox-csi
spec:
  interval: 5m

  maxHistory: 2
  driftDetection:
    mode: enabled

  chart:
    spec:
      chart: proxmox-csi-plugin
      version: 0.5.9
      sourceRef:
        kind: HelmRepository
        name: sergelogvinov
        namespace: flux-system

  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  valuesFrom:
    - kind: Secret
      name: proxmox-csi-cluster-config
      valuesKey: config

  # https://github.com/sergelogvinov/proxmox-csi-plugin/blob/main/charts/proxmox-csi-plugin/values.yaml
  values:
    replicaCount: 1
    metrics:
      enabled: true
    storageClass:
      - name: proxmox-csi-ext4-ssd
        reclaimPolicy: Retain
        fstype: ext4
        storage: vmdata
        ssd: true
      - name: proxmox-csi-ext4-ssd-zfs
        reclaimPolicy: Retain
        fstype: ext4
        storage: local-zfs
        ssd: true
      # HDD-backed (pve-bulk) for write-heavy, disposable data like the
      # Prometheus TSDB: keeps it on block (NFS corrupts TSDB) but off the
      # expensive/high-wear SSD tier. Delete reclaim — data is throwaway, so
      # no orphaned Released PVs to hand-clean on every recreate.
      - name: proxmox-csi-hdd
        reclaimPolicy: Delete
        fstype: ext4
        storage: pve-bulk
        ssd: false
    existingConfigSecret: "proxmox-csi-cluster-config"
    existingConfigSecretKey: "config"
